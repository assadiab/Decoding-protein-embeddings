[workspace]
authors = ["assadiab <assa.diabira@etu.u-paris.fr>"]
channels = ["conda-forge"]
name = "Code"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
install-plm-api = { cmd = "python -m venv plm-api/.venv && plm-api/.venv/bin/pip install -e plm-api/", description = "Install PLM-API in its own venv" }
test-esmc = { cmd = "plm-api/.venv/bin/plm-embeddings -i plm-api/sequence.fasta -o Datasets/test_output/ -m esmc_300M --average-pool", description = "Test ESM-C 300M on sample sequence" }

[dependencies]
python = "3.11.*"
pytorch = ">=2.5.0,<3"
numpy = ">=1.26,<3"
pandas = ">=2.0"
scikit-learn = ">=1.3"
scipy = ">=1.11"
matplotlib = ">=3.7"
seaborn = ">=0.13"
jupyterlab = ">=4.0"
aria2 = ">=1.37.0,<2"
dssp = ">=4.6.0,<5"
graphviz = ">=12.0"
python-graphviz = ">=0.20"

[pypi-dependencies]
safetensors = ">=0.4.0"
biopython = ">=1.85"
rich = ">=13.0"
python-dotenv = ">=1.0.0"
shap = ">=0.46"
